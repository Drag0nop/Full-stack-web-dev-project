<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Autonomous Codebase Documenter</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="register">
    <main class="shell auth-shell">
      <section class="hero compact-hero">
        <article class="card hero-copy">
          <div class="eyebrow">Autonomous Codebase Documenter</div>
          <h1>Create an account for repo-specific documentation.</h1>
          <p class="subtle">
            Keep uploads scoped to your workspace, generate summaries on demand, and build a searchable project history.
          </p>
        </article>
        <form id="register-form" class="card auth-card">
          <div class="eyebrow">Register</div>
          <h2>Create account</h2>
          <label>Email <input type="email" name="email" required /></label>
          <label>Password <input type="password" name="password" minlength="6" required /></label>
          <div class="button-row">
            <button type="submit">Create Account</button>
            <a class="button secondary-link" href="/login">Back To Login</a>
          </div>
          <div id="auth-status" class="status"></div>
          <p class="subtle auth-switch">After registration, you will be redirected back to login.</p>
        </form>
      </section>
    </main>
    <script src="/assets/auth.js"></script>
  </body>
</html>
